<!DOCTYPE html>
<html lang="uz">
<head>

    <title>Mening Birinchi Saytim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="asosiy-quti">
        <h1 class="sarlavha">Assalomu alaykum, xush kelibsiz!</h1>

        <div class="media-bolim">
            <p>Rasm:</p>
            <img src="rasm.jpg" alt="Ozodbek" class="rasm">
        </div>
        <div class="media-bolim">
            <p>musiqa:</p>
            <audio controls class="audio-pleyer">
                <source src="audio.mp3" type="audio/mpeg">
            </audio>
        </div>
        <div class="media-bolim">
            <p>Video:</p>
            <video controls class="video-pleyer">
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
        <button id="tugma">Bu tugmani bosing!</button>
    </div>
    <script src="script.js"></script>

</html>
